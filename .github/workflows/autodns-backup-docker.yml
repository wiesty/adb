name: AutoDNS Backup Docker

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Backup command to run
        required: true
        default: incremental
        type: choice
        options:
          - inventory
          - incremental
          - full
          - verify
      commit_git_export:
        description: Commit git-export directory after a successful run
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

jobs:
  backup:
    runs-on: self-hosted
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build image
        run: docker build -t ghcr.io/wiesty/adb:${{ github.sha }} .

      - name: Prepare persistent directories
        run: |
          mkdir -p .runner-data .runner-work git-export backup
          chmod 700 .runner-data .runner-work git-export backup

      - name: Run backup container
        env:
          AUTODNS_BASE_URL: ${{ vars.AUTODNS_BASE_URL || 'https://api.autodns.com/v1' }}
          AUTODNS_USERNAME: ${{ secrets.AUTODNS_USERNAME }}
          AUTODNS_PASSWORD: ${{ secrets.AUTODNS_PASSWORD }}
          AUTODNS_CONTEXT: ${{ secrets.AUTODNS_CONTEXT }}
          AUTODNS_USER_AGENT: tenbyte-autodns-backup/1.0 github-actions
          BACKUP_CONCURRENCY: ${{ vars.BACKUP_CONCURRENCY || '2' }}
          BACKUP_REQUESTS_PER_SECOND: ${{ vars.BACKUP_REQUESTS_PER_SECOND || '2' }}
          BACKUP_REQUEST_TIMEOUT_MS: ${{ vars.BACKUP_REQUEST_TIMEOUT_MS || '30000' }}
          BACKUP_MAX_RETRIES: ${{ vars.BACKUP_MAX_RETRIES || '5' }}
          FORCE_REEXPORT_AFTER_DAYS: ${{ vars.FORCE_REEXPORT_AFTER_DAYS || '7' }}
          MISSING_CONFIRMATION_RUNS: ${{ vars.MISSING_CONFIRMATION_RUNS || '3' }}
          MAX_INVENTORY_DROP_PERCENT: ${{ vars.MAX_INVENTORY_DROP_PERCENT || '1' }}
          MAX_FAILED_ZONES: ${{ vars.MAX_FAILED_ZONES || '5' }}
          STORAGE_DRIVER: ${{ vars.STORAGE_DRIVER || 's3' }}
          S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
          S3_REGION: ${{ vars.S3_REGION || 'us-east-1' }}
          S3_BUCKET: ${{ vars.S3_BUCKET || 'dns' }}
          S3_PREFIX: ${{ vars.S3_PREFIX || 'autodns' }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_FORCE_PATH_STYLE: ${{ vars.S3_FORCE_PATH_STYLE || 'true' }}
          S3_SERVER_SIDE_ENCRYPTION: ${{ vars.S3_SERVER_SIDE_ENCRYPTION }}
          GIT_EXPORT_ENABLED: ${{ vars.GIT_EXPORT_ENABLED || 'true' }}
          GIT_EXPORT_WRITE_BIND: ${{ vars.GIT_EXPORT_WRITE_BIND || 'true' }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL || 'info' }}
          MODE: ${{ inputs.mode || 'incremental' }}
        run: |
          docker run --rm \
            --name adb-backup-${{ github.run_id }} \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges:true \
            --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            -e AUTODNS_BASE_URL \
            -e AUTODNS_USERNAME \
            -e AUTODNS_PASSWORD \
            -e AUTODNS_CONTEXT \
            -e AUTODNS_USER_AGENT \
            -e BACKUP_CONCURRENCY \
            -e BACKUP_REQUESTS_PER_SECOND \
            -e BACKUP_REQUEST_TIMEOUT_MS \
            -e BACKUP_MAX_RETRIES \
            -e FORCE_REEXPORT_AFTER_DAYS \
            -e MISSING_CONFIRMATION_RUNS \
            -e MAX_INVENTORY_DROP_PERCENT \
            -e MAX_FAILED_ZONES \
            -e DATABASE_PATH=/data/backup.sqlite \
            -e WORK_DIRECTORY=/data/work \
            -e STORAGE_DRIVER \
            -e LOCAL_BACKUP_PATH=/backup \
            -e S3_ENDPOINT \
            -e S3_REGION \
            -e S3_BUCKET \
            -e S3_PREFIX \
            -e S3_ACCESS_KEY_ID \
            -e S3_SECRET_ACCESS_KEY \
            -e S3_FORCE_PATH_STYLE \
            -e S3_SERVER_SIDE_ENCRYPTION \
            -e GIT_EXPORT_ENABLED \
            -e GIT_EXPORT_PATH=/git-export \
            -e GIT_EXPORT_WRITE_BIND \
            -e ALERT_WEBHOOK_URL \
            -e LOG_LEVEL \
            -v "$PWD/.runner-data:/data" \
            -v "$PWD/.runner-work:/data/work" \
            -v "$PWD/backup:/backup" \
            -v "$PWD/git-export:/git-export" \
            ghcr.io/wiesty/adb:${{ github.sha }} "$MODE"

      - name: Commit git export
        if: ${{ success() && (inputs.commit_git_export || github.event_name == 'schedule') }}
        run: |
          git config user.name "autodns-backup-bot"
          git config user.email "autodns-backup-bot@users.noreply.github.com"
          git add git-export
          if git diff --cached --quiet; then
            echo "No git-export changes to commit."
          else
            git commit -m "chore: update AutoDNS git export"
            git push
          fi
